<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fundacion MP</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="blob-container">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
    <div class="blob b5"></div>
    <div class="dot d1"></div>
    <div class="dot d2"></div>
    <div class="dot d3"></div>
    <div class="dot d4"></div>
  </div>

  <nav class="navbar">
    <div class="logo">
      <span class="logo-dot"></span> Fundacion MP
    </div>
    
    <div class="burger-wrapper" id="open-menu-btn">
      <div class="nav-curve"></div>
      <div class="burger-content">
        <div class="lines">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="hover-text">Menu</div>
        <div class="hanging-decor">
          <span class="drop"></span>
          <span class="drop"></span>
          <span class="drop"></span>
        </div>
      </div>
    </div>

    <a href="#" class="donate-btn">Donate</a>
  </nav>

  <main class="hero">
    <h1>Place holder</h1>
    <h2>Lorem ipsum</h2>
  </main>

  <div class="menu-overlay" id="menu-overlay">
    <div class="menu-header">
      <div class="logo"><span class="logo-dot"></span> Fundacion MP</div>
      <a href="#" class="donate-btn">Donate</a>
    </div>

    <div class="menu-links">
      <div class="col">
        <a href="#">About us</a>
        <a href="#">Our work</a>
        <a href="#">Our partners</a>
      </div>
      <div class="col">
        <a href="#">Support us</a>
        <a href="#">Contact us</a>
      </div>
    </div>

    <div class="social-icons">
      <div class="icon">f</div>
      <div class="icon">𝕏</div>
      <div class="icon">in</div>
    </div>

    <div class="close-wrapper" id="close-menu-btn">
      <div class="close-curve"></div>
      <div class="close-content">
        <div class="hanging-decor">
          <span class="drop"></span>
          <span class="drop"></span>
          <span class="drop"></span>
        </div>
        <div class="close-text">close</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
